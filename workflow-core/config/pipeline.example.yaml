name: example-pipeline
description: Example workflow pipeline demonstrating block-based execution

integrations:
  youtrack: youtrack-default
  gitlab: gitlab-default
  github: github-default

# =============================================================================
# Entry Points — named starting scenarios
# =============================================================================
entry_points:
  - id: from_scratch
    name: "Новое требование"
    description: "Полный pipeline с нуля: анализ → задачи → код → MR → CI"
    from_block: youtrack_input
    requires_input: requirement

  - id: youtrack_issue
    name: "Задача в YouTrack"
    description: "Загрузить задачу из YouTrack и запустить полный pipeline"
    from_block: youtrack_input
    requires_input: youtrack_issue

  - id: tasks_exist
    name: "Задачи уже в YouTrack"
    description: "Подзадачи созданы — пропустить analysis/tasks, сразу к codegen"
    from_block: codegen
    requires_input: youtrack_issue
    inject:
      - block_id: youtrack_input
        source: youtrack
      - block_id: analysis
        source: empty
      - block_id: clarification
        source: empty
      - block_id: tasks
        source: youtrack_tasks
    auto_detect: youtrack_subtasks

  - id: branch_exists
    name: "Ветка уже в GitLab"
    description: "Код написан на ветке — пропустить codegen, создать MR"
    from_block: mr
    requires_input: youtrack_issue_and_branch
    inject:
      - block_id: youtrack_input
        source: youtrack
      - block_id: analysis
        source: empty
      - block_id: clarification
        source: empty
      - block_id: tasks
        source: empty
      - block_id: codegen
        source: gitlab_branch
    auto_detect: gitlab_branch

  - id: mr_open
    name: "MR уже открыт"
    description: "Только мониторинг CI"
    from_block: deploy
    requires_input: youtrack_issue_and_mr
    inject:
      - block_id: youtrack_input
        source: youtrack
      - block_id: analysis
        source: empty
      - block_id: clarification
        source: empty
      - block_id: tasks
        source: empty
      - block_id: codegen
        source: gitlab_branch
      - block_id: mr
        source: gitlab_mr
    auto_detect: gitlab_mr

pipeline:
  - id: youtrack_input
    block: youtrack_input
    approval: true
    depends_on: []
    config:
      issue_id: ""         # overridden at runtime via youtrackIssue API field
      task_mode: decompose # decompose | supplement — editable via approval gate

  - id: analysis
    block: analysis
    approval: true
    depends_on:
      - youtrack_input
    agent:
      model: claude-sonnet-4-6
      maxTokens: 8192
      temperature: 1.0

  - id: clarification
    block: clarification
    approval: true
    depends_on:
      - analysis
    condition: "$.analysis.estimated_complexity != 'low'"

  - id: tasks
    block: youtrack_task_creation
    approval: true
    depends_on:
      - analysis
      - clarification

  - id: codegen
    block: code_generation
    approval: true
    depends_on:
      - tasks
      - analysis
    agent:
      model: claude-sonnet-4-6
      maxTokens: 8192
      temperature: 1.0

  - id: mr
    block: gitlab_mr
    approval: true
    depends_on:
      - codegen
    config:
      target_branch: main

  - id: deploy
    block: gitlab_ci
    approval: false
    depends_on:
      - mr
    on_failure:
      action: loopback
      target: codegen
      max_iterations: 2
      inject_context:
        ci_stages: "$.deploy.stages"
      failed_statuses:
        - failure
        - failed
        - timeout
