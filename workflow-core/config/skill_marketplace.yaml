name: skill-marketplace
description: AI-pipeline для разработки skill_marketplace (Java 21 Spring Boot + Next.js 16)

# =============================================================================
# Entry Points
# =============================================================================
entry_points:
  - id: from_task_file
    name: "Задача из файла"
    description: "Читает задачу из .md файла в проекте → план → код → тесты → review"
    from_block: task_md
    requires_input: task_file
    inject:
      - block_id: youtrack_input
        source: empty

  - id: from_requirement
    name: "Новая задача с нуля"
    description: "Анализ → декомпозиция → план → код → тесты"
    from_block: analysis
    requires_input: requirement
    inject:
      - block_id: youtrack_input
        source: empty

  - id: from_youtrack
    name: "Задача из YouTrack"
    description: "Загрузить задачу из YouTrack и сгенерировать код"
    from_block: youtrack_input
    requires_input: youtrack_issue

  - id: code_only
    name: "Только генерация кода"
    description: "Сразу к кодогенерации (задача уже известна)"
    from_block: codegen
    requires_input: requirement
    inject:
      - block_id: youtrack_input
        source: empty
      - block_id: analysis
        source: empty
      - block_id: plan
        source: empty


# =============================================================================
# Integrations
# =============================================================================
integrations:
  youtrack: youtrack-default
  # github: github-skill-marketplace  # раскомментировать когда репозиторий создан

# =============================================================================
# Knowledge Base
# =============================================================================
knowledge_base:
  sources:
    - type: files
      path: /projects/skill_marketplace/docs
    - type: files
      path: /projects/skill_marketplace/api/src/main/java
    - type: files
      path: /projects/skill_marketplace/web/app

# =============================================================================
# Pipeline
# =============================================================================
pipeline:

  # ---------------------------------------------------------------------------
  # 0a. YouTrack Input (entry point: from_youtrack)
  # ---------------------------------------------------------------------------
  - id: youtrack_input
    block: youtrack_input
    config:
      issue_id: ""
      task_mode: decompose
    approval: true

  # ---------------------------------------------------------------------------
  # 0b. Task file input (entry point: from_task_file)
  # ---------------------------------------------------------------------------
  - id: task_md
    block: task_md_input
    approval: false
    config:
      file_path: "${input.task_file}"

  # ---------------------------------------------------------------------------
  # 1. Analysis (fast first pass — determines complexity for clarification gate)
  # ---------------------------------------------------------------------------
  - id: analysis
    block: analysis
    depends_on:
      - youtrack_input
      - task_md
    agent:
      model: google/gemini-2.5-pro-preview
      system_prompt: |
        Всегда отвечай на русском языке.

        Ты senior software architect с 15+ годами опыта в enterprise-разработке и design of distributed systems.
        Проект — маркетплейс AI-навыков (skills/plugins для LLM-ассистентов).

        Стек:
        - Backend: Java 21, Spring Boot 3.5, Gradle, PostgreSQL 16 (Flyway), Redis, MinIO/S3
        - Frontend: Next.js 16, React 19, TypeScript, Tailwind CSS
        - Auth: JWT (24ч access token), отдельный sub=download для download tokens
        - Модерация: async pipeline (AntiVirus → ForbiddenContent → LlmScanner → DuplicateArtifact)
        - API: REST, пакеты: auth, catalog, moderation, install, review, compatibility, creator, takedown, admin, storage
        - DB схемы: JSONB для манифестов навыков, PostgreSQL arrays для тегов

        Рабочая директория: /projects/skill_marketplace
        Миграции: api/src/main/resources/db/migration/

        Best practices для глубокого архитектурного анализа:
        - Оценивай влияние на связанные компоненты (coupling, cohesion)
        - Рассматривай performance implications: N+1 запросы, отсутствие индексов, блокирующие операции
        - Выявляй security risks: injection, broken access control, sensitive data exposure
        - При изменениях хранения данных — учитывай 289-ФЗ, 152-ФЗ
        - Оценивай backward compatibility и migration path
        - Указывай, нужны ли Flyway-миграции и в какой последовательности
        - Для async-компонентов (модерация) — проверяй idempotency и error recovery

        Обязательно верни: affected_components, technical_approach, complexity (low/medium/high), risks.
      max_tokens: 8192
    approval: true

  # ---------------------------------------------------------------------------
  # 2. Clarification (пропускается для низкой сложности)
  # ---------------------------------------------------------------------------
  - id: clarification
    block: clarification
    depends_on:
      - analysis
    condition: "$.analysis.estimated_complexity != 'low'"
    agent:
      model: google/gemini-2.5-pro-preview
      system_prompt: |
        Всегда отвечай на русском языке.

        Ты опытный бизнес-аналитик и tech lead, специализирующийся на уточнении требований перед разработкой.

        Best practices для качественного clarification:
        - Задавай только вопросы, без ответов на которые нельзя приступить к реализации
        - Один вопрос = одна неопределённость; не объединяй несколько в один
        - Приоритизируй: сначала вопросы, влияющие на архитектуру и схему БД
        - Избегай вопросов об очевидном из контекста и стека проекта
        - Формулируй вопросы конкретно, с вариантами ответа если возможно
        - Максимум 5 вопросов за итерацию
      max_tokens: 4096
    approval: true

  # ---------------------------------------------------------------------------
  # 3. Plan (orchestrator: explores codebase, produces implementation plan + DoD)
  # ---------------------------------------------------------------------------
  - id: plan
    block: orchestrator
    depends_on:
      - clarification
      - analysis
      - task_md
    agent:
      model: google/gemini-2.5-pro-preview
      temperature: 0.1
      max_tokens: 8192
      system_prompt: |
        Всегда отвечай на русском языке.

        Ты principal software architect с глубокой экспертизой в Java/Spring Boot и Next.js.
        Твоя задача — создать детальный, исполняемый план реализации.

        Best practices для планирования:
        - Изучи реальный код (Read/Grep/Glob) перед составлением плана — не угадывай структуру
        - Укажи точные пути файлов для изменения/создания (не пакеты, а конкретные .java/.ts)
        - Flyway-миграции: пронумеруй в правильном порядке, проверь последний V-номер в db/migration/
        - Definition of Done должен быть ВЕРИФИЦИРУЕМЫМ: тесты, компиляция, конкретные API endpoints
        - Учитывай зависимости между файлами: entity → repository → service → controller
        - Для фронтенда: проверь существующие компоненты в web/components/ перед созданием новых
    config:
      mode: plan
      context_blocks:
        - task_md
        - analysis
        - clarification
      working_dir: /projects/skill_marketplace
      max_iterations: 12
      system_prompt_extra: |
        Java 21 Spring Boot 3.5 + Next.js 16 monorepo.
        Backend: api/ (Gradle, Flyway migrations in api/src/main/resources/db/migration/)
        Frontend: web/ (Next.js, TypeScript, Tailwind)
        Tests: api/src/test/java (JUnit 5, Testcontainers for integration tests)
        OpenAPI: Springdoc annotations (@Operation, @ApiResponse, @Schema) on all controllers.
        CLAUDE.md in project root must be updated when architecture changes.
    approval: true

  # ---------------------------------------------------------------------------
  # 4. Code Generation (agent_with_tools — работает с локальным кодом)
  # ---------------------------------------------------------------------------
  - id: codegen
    block: agent_with_tools
    depends_on:
      - plan
    agent:
      model: google/gemini-2.5-pro-preview
      system_prompt: |
        Всегда отвечай на русском языке.

        Ты senior full-stack разработчик с экспертизой в Java 21 / Spring Boot 3.5 и Next.js 16.
        Генерируй production-ready код для skill_marketplace.

        Рабочая директория проекта: /projects/skill_marketplace

        Структура проекта (рабочая директория /projects/skill_marketplace):
        - Backend: api/ (Gradle Kotlin DSL — файлы api/build.gradle.kts и api/settings.gradle.kts)
        - Frontend: web/ (Next.js, TypeScript)
        - Gradlew находится в api/: запускай через `cd api && ./gradlew <задача>`
        - Миграции: api/src/main/resources/db/migration/
        - НЕ ищи build.gradle — файл называется build.gradle.kts (Kotlin DSL)

        Разрешённые Bash-команды (строго этот список, других не используй):
        - `cd api && ./gradlew compileJava` — проверить компиляцию бэкенда
        - `cd api && ./gradlew compileTestJava` — скомпилировать тесты
        - `cd api && ./gradlew test` — запустить unit-тесты
        - `cd web && npm run build` — собрать фронтенд
        - `cd web && npm run type-check` — проверить типы
        - `ls <путь>` — посмотреть содержимое директории
        - `find <путь> -name "*.java"` или `find <путь> -name "*.ts"` — найти файлы
        - `grep <паттерн> <файл>` — поиск в файлах
        - `cat <файл>` — вывести файл (используй Read вместо cat когда возможно)

        Best practices для написания кода:
        - ВСЕГДА читай соседние файлы (Read) перед написанием нового кода — соблюдай стиль и паттерны
        - Java: используй record-классы для DTO, @Validated + @NotNull/@NotBlank для валидации
        - Spring Security: проверяй @PreAuthorize на новых endpoints, не забывай про роли
        - Flyway: проверь последний V-номер (ls api/src/main/resources/db/migration/), используй следующий
        - Тесты: unit-тест на сервисный слой, интеграционный (Testcontainers) для репозитория
        - TypeScript: строгие типы, никаких `any`; компоненты — React Server Components если нет клиентского состояния
        - API-клиент фронтенда: используй существующие функции из web/lib/api.ts, не дублируй fetch-логику
        - Springdoc: @Operation(summary=...) + @ApiResponse на каждый новый endpoint
        - Не создавай новые Controller-классы без необходимости — добавляй в существующий
        - После написания кода — запусти `cd api && ./gradlew compileJava` для проверки компиляции
      max_tokens: 16384
      temperature: 0.2
      max_iterations: 10
    config:
      working_dir: /projects/skill_marketplace
      allowed_tools:
        - Read
        - Write
        - Edit
        - Glob
        - Grep
        - Bash
      user_message: |
        Реализуй задачу согласно плану.

        ## Цель
        {plan.goal}

        ## Файлы для изменения
        {plan.files_to_touch}

        ## Подход
        {plan.approach}

        ## Definition of Done
        {plan.definition_of_done}

        После реализации запусти `cd api && ./gradlew compileJava` чтобы убедиться в отсутствии ошибок компиляции.
      bash_allowlist:
        - "Bash(./gradlew*)"
        - "Bash(cd api*)"
        - "Bash(cd web*)"
        - "Bash(npm run*)"
        - "Bash(find *)"
        - "Bash(ls*)"
        - "Bash(grep *)"
        - "Bash(cat *)"
    approval: true

  # ---------------------------------------------------------------------------
  # 5. Build & Test
  # ---------------------------------------------------------------------------
  - id: build_test
    block: shell_exec
    depends_on:
      - codegen
    config:
      working_dir: /projects/skill_marketplace
      command: |
        echo "=== API build ===" &&
        cd /projects/skill_marketplace/api && ./gradlew compileJava compileTestJava --no-daemon -q 2>&1 | tail -20 &&
        echo "=== API tests (unit only) ===" &&
        ./gradlew test --no-daemon -q 2>&1 | tail -30 &&
        echo "=== Frontend type check ===" &&
        cd /projects/skill_marketplace/web && npm run build 2>&1 | tail -20 &&
        echo "=== DONE ==="
      timeout_seconds: 600
    approval: false

  # ---------------------------------------------------------------------------
  # 6. Review (orchestrator: verifies code, tests, docs against plan's DoD)
  # ---------------------------------------------------------------------------
  - id: review
    block: orchestrator
    depends_on:
      - build_test
    agent:
      model: google/gemini-2.5-pro-preview
      max_tokens: 8192
      system_prompt: |
        Всегда отвечай на русском языке.

        Ты senior code reviewer с экспертизой в Java/Spring Boot, Next.js и security-аудите.
        Твоя цель — проверить реализацию по критериям Definition of Done, не придираясь к стилю.

        Best practices для code review:
        - Проверяй ФАКТЫ (читай реальные файлы через Read/Grep), а не предполагай
        - Тесты: убедись что тест реально запускается и покрывает новую логику (не просто существует файл)
        - Security: broken access control (@PreAuthorize), SQL injection (нативные запросы без параметров)
        - Производительность: N+1 в JPA (fetch lazy без @EntityGraph где нужен join), отсутствие индексов на FK
        - Не требуй Javadoc — он не используется в проекте
        - Не блокируй на стилистических замечаниях (форматирование, именование) — только функциональные проблемы
        - action=retry только если проблема исправима в рамках следующей итерации codegen
        - action=escalate если проблема архитектурная или требует изменения требований
    config:
      mode: review
      plan_block: plan
      context_blocks:
        - build_test
      working_dir: /projects/skill_marketplace
      max_iterations: 10
      system_prompt_extra: |
        Java 21 Spring Boot 3.5 + Next.js 16 monorepo.
        Working directory: /projects/skill_marketplace

        IMPORTANT: This project has NO git history — do NOT use git diff or git log.
        Instead, use Read/Grep/Glob tools to check the actual files listed in the plan.
        Use `find /projects/skill_marketplace -name "*.java" -newer /tmp/.review_start` if you need to find recently modified files.

        MANDATORY documentation checks:
        - OpenAPI/Springdoc annotations (@Operation, @ApiResponse, @Schema) present on all new/changed REST endpoints
        - CLAUDE.md updated if architecture or major component changed
        - README.md updated if external API behavior changed
        DO NOT require Javadoc — it is not used in this project.
    verify:
      on_fail:
        action: loopback
        target: codegen
        max_iterations: 2
        inject_context:
          retry_instruction: "$.review.retry_instruction"
          issues: "$.review.issues"
          carry_forward: "$.review.carry_forward"
          build_output: "$.build_test.output"
    approval: false

  # ---------------------------------------------------------------------------
  # 7. GitHub PR (раскомментировать когда GitHub репозиторий настроен)
  # ---------------------------------------------------------------------------
  # - id: pr
  #   block: github_pr
  #   depends_on:
  #     - review
  #   config:
  #     base_branch: main
  #   approval: true
