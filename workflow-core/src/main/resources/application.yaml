spring:
  datasource:
    url: jdbc:h2:file:./.workflow/workflow-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
  main:
    banner-mode: off

workflow:
  mode: cli  # cli | gui
  config-dir: ./config
  state-dir: ./.workflow/state
  orchestrator:
    # Tier name — ModelPresetResolver picks the concrete model per provider:
    # OpenRouter route → z-ai/glm-4.6, CLI route → claude-sonnet-4-6.
    default-model: smart
  smart-detect:
    model: google/gemini-2.0-flash-001
    confidence-threshold: 0.7
  escalation:
    # Fallback ladder when a block's verify.on_fail / on_failure exhausts max_iterations
    # AND the block did not provide its own escalation: [...]. Used by EscalationResolver
    # as level-3 fallback (level-1 = block YAML, level-2 = Project.escalationDefaultsJson).
    # Tier 'cloud' switches the block to a heavier model/provider and reruns with reset
    # loop counter; tier 'human' pauses for operator approval.
    defaults:
      - tier: cloud
        provider: openrouter
        model: smart
        max-iterations: 2
      - tier: human
        notify: [ui]
        timeout: 86400
    # Hard cap on cumulative cloud-tier LLM spend per run, in USD. Exceeded → cloud-tier
    # escalation is skipped and the ladder jumps to the next human step (or fails if
    # there is no human step). Read by cost-tracking integration in Phase B2.
    max-budget-usd: 10.00
  encryption:
    # 32 bytes (AES-256), Base64-encoded. Override via WORKFLOW_ENCRYPTION_KEY in prod.
    # When absent, a development key is used with a loud warning at startup.
    key: ${WORKFLOW_ENCRYPTION_KEY:}
  # Root directory for the filesystem browser. Override via BROWSE_ROOT_PATH env var.
  # In Docker: set to the mounted projects volume (e.g. /projects).
  browse-root: ${BROWSE_ROOT_PATH:#{systemProperties['user.home']}}
  prompt-context:
    allow: ["git *", "find", "ls", "cat", "head", "tail", "tree"]
    timeout-ms: 5000
  knowledge:
    # Qdrant URL. When unset, KnowledgeBase falls back to NoOpKnowledgeBase and the
    # Search tool returns "(no project index)" — runs still work, just without RAG.
    # In Docker: http://qdrant:6333 (service name), or http://host.docker.internal:6333
    # when Qdrant runs on the host.
    qdrant:
      url: ${QDRANT_URL:}
    # Ollama model used to embed both indexed chunks and search queries. Must be the
    # same on both sides (mismatch → mismatched dims → empty results). 274 MB,
    # 768-dim; mxbai-embed-large (1024-dim) is the next step up if recall is weak.
    embed-model: ${EMBED_MODEL:nomic-embed-text:v1.5}
    chunk-lines: 200
    chunk-overlap: 30

logging:
  level:
    root: WARN
    com.workflow: INFO

server:
  port: 8020
  servlet:
    session:
      timeout: 24h

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: workflow
