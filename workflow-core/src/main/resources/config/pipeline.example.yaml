name: example-pipeline
description: Example workflow pipeline demonstrating block-based execution

integrations:
  youtrack: youtrack-default
  gitlab: gitlab-default
  github: github-default
  openrouter: openrouter-default

knowledgeBase:
  sources:
    - type: git
      url: https://github.com/example/docs.git
      branch: main
      path: docs/

pipeline:
  - id: fetch_issue
    block: youtrack_input
    approval: false
    depends_on: []
    config:
      fields: "id,summary,description,customFields(name,value(name,text))"

  - id: analyze_requirement
    block: llm_agent
    approval: true
    depends_on:
      - fetch_issue
    agent:
      model: claude-sonnet-4-6
      maxTokens: 4096
      temperature: 0.7
      systemPrompt: |
        You are a software architect. Analyze the requirement and produce a structured
        implementation plan. Return a JSON object with:
        - summary: Brief one-line summary
        - tasks: List of concrete development tasks
        - acceptance_criteria: List of testable acceptance criteria
        - estimated_complexity: low | medium | high
    config:
      output_format: json

  - id: create_branch
    block: gitlab_branch
    approval: false
    depends_on:
      - analyze_requirement
    config:
      branch_prefix: "feature/"
      base_branch: main

  - id: generate_code
    block: llm_agent
    approval: true
    depends_on:
      - analyze_requirement
      - create_branch
    agent:
      model: claude-sonnet-4-6
      maxTokens: 8192
      temperature: 1.0
      systemPrompt: |
        You are a senior software engineer. Generate the implementation code based
        on the analyzed requirements. Follow the project's code style and conventions.
        Return a JSON object with:
        - files: Map of file_path -> file_content
        - commit_message: Descriptive commit message
        - notes: Any implementation notes
    config:
      output_format: json

  - id: commit_code
    block: gitlab_commit
    approval: false
    depends_on:
      - generate_code
      - create_branch
    config:
      auto_commit: true

  - id: create_merge_request
    block: gitlab_mr
    approval: true
    depends_on:
      - commit_code
    config:
      target_branch: main
      labels:
        - automated
        - needs-review

  - id: update_issue
    block: youtrack_update
    approval: false
    depends_on:
      - create_merge_request
    config:
      transition: "In Review"
      add_comment: true
