name: feature
description: |
  Generic feature pipeline (Phase 1).

  Flow: task.md → implementation via tool-use agent → build → tests →
  squash commit. All cross-block wiring uses ${block.field} interpolation;
  the agent sees auto-appended issues on verify loopback.

  This file is the built-in example/template. Copy it to your project at
  <project>/.ai-workflow/pipelines/feature.yaml and adjust working_dir,
  build/test commands, and model to match your stack.

  Start a run with entry point "implement". Pass the absolute path to the
  task.md file as the requirement (e.g. /myproject/tasks/active/FEAT-001_slug.md).

entry_points:
  - id: implement
    name: "Implement a task.md ticket"
    from_block: task_md
    requires_input: task_file

pipeline:
  - id: task_md
    block: task_md_input
    approval: false
    depends_on: []
    config:
      file_path: "${input.requirement}"

  - id: impl
    block: agent_with_tools
    approval: false
    depends_on: [task_md]
    agent:
      model: deepseek/deepseek-chat-v3-0324
      maxTokens: 8192
      temperature: 0.2
      systemPrompt: |
        You implement feature tickets precisely. Use the provided tools to
        read the codebase, edit existing files, and write new ones. Stay
        inside the working directory. When the task is done, end your turn
        with one short confirmation sentence.
    config:
      working_dir: /project  # set to the Docker mount path of your repo
      user_message: |
        Feature: ${task_md.title}

        ## To be
        ${task_md.to_be}

        ## Acceptance criteria
        ${task_md.acceptance}

        Implement the feature above. Keep changes scoped — no unrelated
        refactors. Prefer Edit over Write for existing files.
      allowed_tools: [Read, Write, Edit, Glob, Grep, Bash]
      bash_allowlist:
        - Bash(git status)
        - Bash(git diff*)
        - Bash(git add*)
        - Bash(cat *)
      max_iterations: 40
      budget_usd_cap: 5.0

  - id: build
    block: shell_exec
    approval: false
    depends_on: [impl]
    config:
      working_dir: /project  # set to the Docker mount path of your repo
      command: "echo BUILD_SKIPPED"   # replace with your actual build command
      timeout_sec: 120
      allow_nonzero_exit: true

  - id: verify_build
    block: verify
    approval: false
    depends_on: [build]
    verify:
      subject: build
      checks:
        - { field: success, rule: equals, value: true }
      on_fail:
        action: loopback
        target: impl
        max_iterations: 3
        inject_context:
          build_stderr: "$.build.stderr"
          build_exit: "$.build.exit_code"

  - id: tests
    block: shell_exec
    approval: false
    depends_on: [verify_build]
    config:
      working_dir: /project  # set to the Docker mount path of your repo
      command: "echo TEST_SKIPPED"    # replace with your actual test command
      timeout_sec: 120
      allow_nonzero_exit: true

  - id: verify_tests
    block: verify
    approval: false
    depends_on: [tests]
    verify:
      subject: tests
      checks:
        - { field: success, rule: equals, value: true }
      on_fail:
        action: loopback
        target: impl
        max_iterations: 3
        inject_context:
          test_failures: "$.tests.stdout"

  - id: commit
    block: shell_exec
    approval: false
    depends_on: [verify_tests]
    config:
      working_dir: /project  # set to the Docker mount path of your repo
      command: |
        git add -A && \
        git commit -m "${task_md.feat_id}: ${task_md.title}

        ${task_md.to_be}

        Implements acceptance criteria from ${task_md.slug}.md"
      allow_nonzero_exit: false
