# =============================================================================
# Workflow Pipeline Configuration Example
# =============================================================================
#
# This file defines a full AI-driven development pipeline that takes a feature
# requirement from initial analysis all the way through to a deployed merge
# request with YouTrack task tracking.
#
# Environment variables are referenced with ${VAR_NAME} syntax and are
# expanded at load time. All sensitive credentials should be stored in
# environment variables, never committed to source control.
#
# =============================================================================
# ENTRY POINTS – choose the right command for your situation:
# =============================================================================
#
# Ситуация 1: Нет ничего – только идея
#   workflow run config/pipeline.example.yaml --requirement "Add OAuth2 login"
#
# Ситуация 2: Есть задача в YouTrack (PROJ-42) с плохим описанием
#   workflow run config/pipeline.example.yaml --youtrack-issue PROJ-42
#
# Ситуация 3: Задачи в YouTrack уже созданы – нужен только код
#   workflow run config/pipeline.example.yaml --youtrack-issue PROJ-42 \
#     --entry-point tasks_exist
#   (или: --from-block codegen)
#
# Ситуация 4: Код уже написан на ветке – нужен только MR
#   workflow run config/pipeline.example.yaml --youtrack-issue PROJ-42 \
#     --entry-point branch_exists
#   (или: --from-block mr --inject-block codegen=./codegen_state.json)
#
# Ситуация 5: MR уже открыт – только мониторинг CI
#   workflow run config/pipeline.example.yaml --youtrack-issue PROJ-42 \
#     --entry-point mr_open
#
# Resume прерванного run:
#   workflow resume config/pipeline.example.yaml --run-id <uuid>
#
# Статус run (включая историю loopback):
#   workflow status config/pipeline.example.yaml --run-id <uuid>
# =============================================================================
# =============================================================================

# Human-readable pipeline name. Also used as the state directory name.
name: feature-pipeline

# Optional description shown in the CLI header.
description: Full AI-driven development pipeline – from requirement to deployed MR

# =============================================================================
# Entry Points (named starting scenarios)
# =============================================================================
# Declare named entry points used with --entry-point flag.
# auto_detect matches what detect_progress() finds in YouTrack / GitLab / GitHub.
entry_points:
  - id: from_scratch
    name: "Новое требование"
    description: "Полный pipeline с нуля: анализ → задачи → код → MR → CI"
    from_block: youtrack_input
    requires_input: requirement

  - id: tasks_exist
    name: "Задачи уже в YouTrack"
    description: "Подзадачи созданы, нужен только код"
    from_block: codegen
    requires_input: youtrack_issue
    inject:
      - block_id: youtrack_input
        source: youtrack
      - block_id: analysis
        source: empty
      - block_id: clarification
        source: empty
      - block_id: tasks
        source: youtrack
        config:
          use_subtasks: true
    auto_detect: youtrack_subtasks

  - id: branch_exists
    name: "Ветка уже в GitLab"
    description: "Код написан, нужен только MR"
    from_block: mr
    requires_input: youtrack_issue_and_branch
    inject:
      - block_id: codegen
        source: gitlab_branch
    auto_detect: gitlab_branch

  - id: mr_open
    name: "MR уже открыт"
    description: "Только мониторинг CI"
    from_block: deploy
    requires_input: youtrack_issue_and_mr
    inject:
      - block_id: codegen
        source: gitlab_branch
      - block_id: mr
        source: gitlab_mr
    auto_detect: gitlab_mr

# =============================================================================
# Integrations
# =============================================================================

integrations:
  # YouTrack task tracker – used by the youtrack_tasks block.
  youtrack:
    base_url: ${YOUTRACK_URL}        # e.g. https://youtrack.example.com
    token: ${YOUTRACK_TOKEN}          # Permanent token (Hub > Manage tokens)
    project: ${YOUTRACK_PROJECT}      # Short project name, e.g. MYPROJECT

  # GitLab – used by the gitlab_mr and gitlab_ci blocks.
  gitlab:
    url: ${GITLAB_URL}               # e.g. https://gitlab.com
    token: ${GITLAB_TOKEN}           # Personal or project access token
    project_id: ${GITLAB_PROJECT_ID} # Numeric project ID (Settings > General)

  # GitHub – used by the github_pr and github_actions blocks.
  # Token scopes required: repo, workflow
  # For GitHub Enterprise: url: https://github.example.com/api/v3
  github:
    token: ${GITHUB_TOKEN}           # Personal access token (classic) or fine-grained PAT
    owner: ${GITHUB_OWNER}           # Organisation or user name
    repo: ${GITHUB_REPO}             # Repository name
    url: https://api.github.com      # Override for GitHub Enterprise

# =============================================================================
# Knowledge Base
# =============================================================================
#
# Sources are indexed into a local ChromaDB vector store and queried via
# sentence-transformers (all-MiniLM-L6-v2) during analysis and code generation.
# Run `workflow kb index config/pipeline.example.yaml` to pre-build the index.

knowledge_base:
  sources:
    # Git repository – cloned/pulled to local_path and indexed.
    - type: git
      url: "${REPO_URL}"               # SSH or HTTPS clone URL
      branch: main                      # Branch to index
      local_path: /tmp/workflow-repo    # Where to clone locally

    # Local documentation directory – walks and indexes .md, .txt, .py, etc.
    - type: files
      path: ./docs                      # Relative to the working directory

# =============================================================================
# Pipeline Blocks
# =============================================================================
#
# Blocks execute in dependency order (topological sort of depends_on).
# Each block produces an output dict stored in the run state and passed
# to downstream blocks as input.
#
# approval: true  → The user is shown the block's output and must approve,
#                   edit, reject, or skip (auto-approve) before execution
#                   continues.
# approval: false → The block runs and its output is accepted automatically.

pipeline:
  # ---------------------------------------------------------------------------
  # 0. YouTrack Input  (optional starting point)
  # ---------------------------------------------------------------------------
  # Reads an existing YouTrack issue and turns it into the pipeline requirement.
  # When issue_id is empty the block is a no-op and passes through any
  # requirement provided via --requirement or --input-file unchanged.
  #
  # Usage with an existing issue:
  #   workflow run config/pipeline.example.yaml --youtrack-issue PROJ-42
  #
  # Usage with plain text (youtrack_input is a transparent pass-through):
  #   workflow run config/pipeline.example.yaml --requirement "Add OAuth2 login"
  - id: youtrack_input
    block: youtrack_input      # Maps to YouTrackInputBlock
    config:
      issue_id: ""             # Overridden at runtime by --youtrack-issue / youtrackIssue API field
      task_mode: decompose     # decompose (create subtasks) | supplement (enrich existing task)
                               # User can change via approval gate before pipeline continues
    approval: true             # Let the user review/edit the loaded requirement

  # ---------------------------------------------------------------------------
  # 1. Analysis
  # ---------------------------------------------------------------------------
  # Deep analysis of the requirement: affected components, technical approach,
  # complexity estimate, risks, and open questions.
  - id: analysis
    block: analysis          # Maps to AnalysisBlock
    depends_on:
      - youtrack_input        # Chains after youtrack_input (pass-through when issue_id empty)
    agent:
      model: claude-opus-4-6  # Use the most capable model for analysis
      system_prompt: |
        You are a senior software architect with 15 years of experience.
        Analyse requirements deeply, considering scalability, security, and
        maintainability. Always surface risks and ambiguities as open questions.
      max_tokens: 8192
    approval: true            # Pause and show analysis output for review

  # ---------------------------------------------------------------------------
  # 2. Clarification
  # ---------------------------------------------------------------------------
  # Interactively resolve open questions from the analysis, then produce a
  # refined requirement and an approved technical approach.
  - id: clarification
    block: clarification     # Maps to ClarificationBlock
    depends_on:
      - analysis              # Receives analysis output as input
    agent:
      model: claude-sonnet-4-6
      max_tokens: 4096
    approval: true

  # ---------------------------------------------------------------------------
  # 3. YouTrack Task Creation
  # ---------------------------------------------------------------------------
  # Ситуация A (по умолчанию): Claude генерирует задачи и создаёт их в YouTrack.
  # Ситуация B: задачи уже есть → замените block на youtrack_tasks_input:
  #
  #   - id: tasks
  #     block: youtrack_tasks_input   # читает подзадачи PROJ-42 из YouTrack
  #     depends_on: [youtrack_input]
  #     config:
  #       parent_issue_id: ""         # заполняется из youtrack_input если пусто
  #     approval: true
  - id: tasks
    block: youtrack_tasks    # Maps to YouTrackTaskCreationBlock
    depends_on:
      - clarification
      - analysis
    agent:
      model: claude-sonnet-4-6
      max_tokens: 8192
    approval: true           # Review task breakdown before creating issues

  # ---------------------------------------------------------------------------
  # 4. Code Generation
  # ---------------------------------------------------------------------------
  # Ситуация A (по умолчанию): Claude генерирует код для каждой задачи.
  # Ситуация B: код уже написан на ветке → замените block на git_branch_input:
  #
  #   - id: codegen
  #     block: git_branch_input       # читает diff ветки, не генерирует код
  #     depends_on: [tasks]
  #     config:
  #       branch: feature/PROJ-42-google-oauth
  #       target_branch: main         # против какой ветки сравнивать
  #       commit_message: "feat(auth): add Google OAuth2 login (PROJ-42)"
  #     approval: true
  - id: codegen
    block: code_generation   # Maps to CodeGenerationBlock
    depends_on:
      - tasks
      - clarification
      - analysis
    agent:
      model: claude-opus-4-6  # Best model for code generation
      max_tokens: 8192
    approval: true

  # ---------------------------------------------------------------------------
  # 5. GitLab Merge Request
  # ---------------------------------------------------------------------------
  # Ситуация A (по умолчанию): создаёт ветку, применяет изменения, открывает MR.
  # Ситуация B: MR уже открыт → замените block на mr_input:
  #
  #   - id: mr
  #     block: mr_input               # читает существующий MR
  #     depends_on: [codegen]
  #     config:
  #       branch: feature/PROJ-42-google-oauth   # или mr_iid: 87
  #     approval: true
  - id: mr
    block: gitlab_mr         # Maps to GitLabMRBlock
    depends_on:
      - codegen
    approval: true           # Review the MR plan before pushing

  # ---------------------------------------------------------------------------
  # 6. CI / Deploy Monitoring
  # ---------------------------------------------------------------------------
  # GitLab CI variant (default): polls the pipeline triggered by the MR.
  # GitHub Actions variant: replace block with github_actions (see below).
  - id: deploy
    block: gitlab_ci         # Maps to GitLabCIBlock
    depends_on:
      - mr
    approval: false          # No approval needed – just monitoring CI
    timeout: 3600            # Seconds to wait before timing out (default 1h)

# =============================================================================
# NEW FEATURES – Верификация, Loopback, Условия
# =============================================================================
#
# 1. БЛОК verify — автоматическая проверка качества вывода
#    Ставится после любого генерирующего блока. При провале может:
#    - loopback: автоматически перезапустить целевой блок с контекстом ошибки
#    - fail: остановить pipeline
#    - warn: залогировать и продолжить
#
#   - id: verify_analysis
#     block: verify
#     depends_on: [analysis]
#     approval: false                   # работает автоматически
#     verify:
#       subject: analysis               # чей output проверяем
#       checks:
#         - field: affected_components
#           rule: min_items
#           value: 1
#           message: "Нужно указать хотя бы один затронутый компонент"
#         - field: technical_approach
#           rule: min_length
#           value: 100
#           message: "Технический подход слишком краткий"
#         - field: estimated_complexity
#           rule: one_of
#           value: [low, medium, high]
#       llm_check:
#         enabled: true
#         prompt: |
#           Оцени этот анализ требования 0-10. Проверь:
#           - Затронутые компоненты конкретны (не просто "backend")?
#           - Технический подход достаточно детален для реализации?
#           - Риски реалистичны?
#           Ответь JSON: {"passed": bool, "score": 0-10, "issues": [], "recommendation": ""}
#         min_score: 6
#       on_fail:
#         action: loopback
#         target: analysis              # перезапустить analysis с feedback
#         max_iterations: 2
#         inject_context:
#           feedback: "$.verify_analysis.issues"       # JSONPath в state
#           recommendation: "$.verify_analysis.recommendation"
#
# 2. condition — пропустить блок если условие не выполнено
#    Синтаксис: $.block_id.field [| length] OPERATOR value
#    Операторы: ==, !=, >, <, >=, <=
#
#   - id: clarification
#     block: clarification
#     depends_on: [analysis]
#     condition: "$.analysis.estimated_complexity != 'low'"  # пропустить для простых задач
#     approval: true
#
# 3. on_failure — автоматический loopback при провале CI
#
#   - id: deploy
#     block: gitlab_ci
#     depends_on: [mr]
#     approval: false
#     on_failure:
#       action: loopback
#       target: codegen                 # вернуться к генерации кода
#       max_iterations: 2
#       inject_context:
#         ci_stages: "$.deploy.stages"  # передать лог CI в codegen
#       failed_statuses: [failure, failed, timeout]
#
# =============================================================================
# ALTERNATIVE: GitHub-based pipeline
# =============================================================================
# Replace the gitlab_mr + gitlab_ci blocks above with github_pr + github_actions
# when your repository is on GitHub instead of GitLab.
#
# Minimal GitHub pipeline (replace blocks 5 and 6 above):
#
#   - id: pr
#     block: github_pr             # Creates branch + commits + opens Pull Request
#     depends_on: [codegen]
#     config:
#       base_branch: main          # Target branch for the PR (default: main)
#     approval: true
#
#   - id: deploy
#     block: github_actions        # Monitors GitHub Actions workflows on the PR branch
#     depends_on: [pr]
#     approval: false
#     config:
#       # Optional: watch only specific workflow files.
#       # If omitted, all workflows triggered on the branch are monitored.
#       workflow_files:
#         - .github/workflows/ci.yml
#         - .github/workflows/lint.yml
#
#       # Optional: trigger a workflow_dispatch event before monitoring.
#       # Useful for deployment workflows that don't trigger on push/PR automatically.
#       trigger:
#         workflow_file: deploy.yml
#         ref: main                # Branch/tag/SHA to run on
#         inputs:                  # workflow_dispatch inputs (must match workflow definition)
#           environment: staging
#           version: latest
#
#       timeout: 3600              # Max seconds to wait (default 1h)
