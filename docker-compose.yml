services:
  workflow-core:
    build:
      context: ./workflow-core
    ports:
      - "8020:8020"
    volumes:
      - workflow-state:/app/.workflow
      - ${PROJECTS_ROOT}:/projects:rw
      - gradle-cache:/root/.gradle
      - ${HOME}/.local/share/claude:/home/claude/.local/share/claude:ro
      - ${HOME}/.claude:/home/claude/.claude:rw
      - ${HOME}/.claude.json:/home/claude/.claude.json:rw
    environment:
      WORKFLOW_MODE: gui
      BROWSE_ROOT_PATH: /projects
      WORKFLOW_BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      # ANTHROPIC_API_KEY intentionally NOT set: the OAuth token from
      # ~/.claude/.credentials.json is used by the Claude CLI for the Max
      # subscription. A non-empty ANTHROPIC_API_KEY would force "external API
      # key" mode and reject the OAuth token.
      CLAUDE_BIN: claude-safe
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-AI-Workflow}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-ai-workflow@local}
      GIT_COMMITTER_NAME: ${GIT_AUTHOR_NAME:-AI-Workflow}
      GIT_COMMITTER_EMAIL: ${GIT_AUTHOR_EMAIL:-ai-workflow@local}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      YOUTRACK_URL: ${YOUTRACK_URL}
      YOUTRACK_TOKEN: ${YOUTRACK_TOKEN}
      # Knowledge layer (project source RAG). qdrant service in same compose net.
      QDRANT_URL: http://qdrant:6333
      EMBED_MODEL: ${EMBED_MODEL:-nomic-embed-text:v1.5}
      # Postgres (warcard-postgres container, port 5433 on host). Override via .env
      # if hosting Postgres elsewhere.
      DB_URL: ${DB_URL:-jdbc:postgresql://host.docker.internal:5433/workflow_ai}
      DB_USER: ${DB_USER:-warcard}
      DB_PASSWORD: ${DB_PASSWORD:-warcard123}
      DB_DRIVER: ${DB_DRIVER:-org.postgresql.Driver}
      DB_DIALECT: ${DB_DIALECT:-org.hibernate.dialect.PostgreSQLDialect}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - qdrant

  workflow-ui:
    build:
      context: ./workflow-ui
    ports:
      - "5173:80"
    depends_on:
      - workflow-core

  # Vector store for per-project source code RAG. Backed by an in-container
  # volume — index is rebuilt automatically on first Search query (lazy) or
  # via Project settings → Reindex now (manual).
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  # NOTE: vLLM is intentionally not part of this compose project — it's a
  # shared inference service used by multiple local apps (Blender-AI, this
  # workflow, etc.), so it lives in D:\Проекты\vllm-stack as a standalone
  # compose. Backend reaches it via http://host.docker.internal:8003/v1
  # (Docker Desktop on Windows exposes the host loopback to all containers).
  # To start vLLM:
  #   cd D:\Проекты\vllm-stack && docker compose up -d

volumes:
  workflow-state:
  gradle-cache:
  qdrant-data:
