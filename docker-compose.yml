services:
  workflow-core:
    build:
      context: ./workflow-core
    ports:
      - "8020:8020"
    volumes:
      - workflow-state:/app/.workflow
      - /Users/home/Code:/projects:ro
    environment:
      WORKFLOW_MODE: gui
      BROWSE_ROOT_PATH: /projects
      WORKFLOW_BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}

  workflow-ui:
    build:
      context: ./workflow-ui
    ports:
      - "5173:80"
    depends_on:
      - workflow-core

volumes:
  workflow-state:
