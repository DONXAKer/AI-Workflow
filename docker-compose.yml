services:
  workflow-core:
    build:
      context: ./workflow-core
    ports:
      - "8020:8020"
    volumes:
      - workflow-state:/app/.workflow
      - ${PROJECTS_ROOT}:/projects:rw
      - gradle-cache:/root/.gradle
      - ${HOME}/.local/share/claude:/root/.local/share/claude:ro
      - ${HOME}/.claude:/root/.claude:ro
      - ${HOME}/.claude.json:/root/.claude.json:rw
    environment:
      WORKFLOW_MODE: gui
      BROWSE_ROOT_PATH: /projects
      WORKFLOW_BOOTSTRAP_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ANTHROPIC_API_KEY: ${CLAUDE_OAUTH_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      YOUTRACK_URL: ${YOUTRACK_URL}
      YOUTRACK_TOKEN: ${YOUTRACK_TOKEN}

  workflow-ui:
    build:
      context: ./workflow-ui
    ports:
      - "5173:80"
    depends_on:
      - workflow-core

volumes:
  workflow-state:
  gradle-cache:
