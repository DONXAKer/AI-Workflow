services:
  workflow-core:
    build:
      context: ./workflow-core
    ports:
      - "8020:8020"
    volumes:
      - workflow-state:/app/.workflow
    environment:
      WORKFLOW_MODE: gui

  workflow-ui:
    build:
      context: ./workflow-ui
    ports:
      - "5173:80"
    depends_on:
      - workflow-core

volumes:
  workflow-state:
