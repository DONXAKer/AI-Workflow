# =============================================================================
# Feature pipeline template for AI-Workflow
# =============================================================================
#
# Canonical reference flow that drives a task.md from intake to a pushed branch
# with a one-click PR URL. Adapt the marked TODO/PROJECT-SPECIFIC sections to
# your stack — everything else (block types, condition syntax, loopback wiring,
# tier-based provider routing) is platform-level and should stay as-is.
#
# Usage:
#   1. cp docs/feature-pipeline-template.yaml <your-project>/.ai-workflow/pipelines/feature.yaml
#   2. sed -i 's#/projects/<example>#/projects/<your-project>#g' <feature.yaml>
#   3. Adjust `bash_allowlist` / `build` / `tests` blocks for your build tool
#      (gradle/maven/npm/cargo/etc).
#   4. Remove or adapt project-specific blocks: `validate_contracts`,
#      `ai_simulator`, the entire `[needs_bp]` Unreal sub-flow.
#   5. (One-time per project) reindex source for RAG: Settings → Code Index → Reindex now
#   6. Validate: POST /api/pipelines/validate?configPath=<path>
#
# Provider routing:
#   Use `tier: smart` (analytical: analysis/plan/review/agent_verify) and
#   `tier: flash` (executor: agent_with_tools) — the platform routes them via
#   ModelPresetResolver to OpenRouter or Claude CLI based on the project's
#   `defaultProvider` setting. Don't pin literal model names like `qwen/...`
#   or `claude-sonnet-4-6` unless you're sure you want a single provider.
#
# Recent platform features used here:
#   - `prose_fallback`        — orchestrator accepts Markdown when model refuses JSON
#   - `focus_on_failure`      — narrow root-cause prompt on build/tests loopback
#   - `auto_inject_rag`       — prepends top-3 Qdrant chunks to user_message
#   - `mcp_servers`           — agent_with_tools sees remote MCP tools alongside native
#   - Merged shell+verify     — shell_exec self-triggers loopback on `success: false`
#                                (no separate `verify` wrapper needed)
# =============================================================================

name: "feature"
description: |
  Feature pipeline with orchestrator supervision + agent_verify acceptance gate.

  Flow:
    task.md
    → analysis (smart, approval) [drops acceptance_checklist for verify_acceptance]
    → clarification (smart, conditional on needs_clarification)
    → create_branch (approval, names + creates branch atomically)
    → plan_impl (orchestrator, RAG-injected)
    → impl_server (agent_with_tools, RAG-injected)
    → review_impl (orchestrator + loopback to impl)
    → build (self-loopback on success=false)
    → tests (self-loopback on success=false)
    → validate_contracts (self-loopback) [PROJECT: contracts/validator]
    → ai_simulator (self-loopback) [PROJECT: smoke runner]
    → verify_acceptance (agent_verify on acceptance_checklist + loopback)
    → [needs_bp] check_unreal (approval) → plan_bp → impl_bp → review_bp [PROJECT: UE5]
    → diff_review (approval) → commit → git_push → pr_link

defaults:
  agent:
    temperature: 0.3
    maxTokens: 8192

pipeline:
  - id: "task_md"
    block: "task_md_input"
    approval: false
    config:
      file_path: "${input.task_file}"

  - id: "analysis"
    block: "analysis"
    agent:
      tier: "smart"
      temperature: 0.3
      maxTokens: 8192
      system_prompt: |
        ACCEPTANCE CHECKLIST RULES — строго соблюдай при генерации acceptance_checklist:

        Каждый пункт checklist ДОЛЖЕН быть верифицируем через Read/Grep/Bash по исходному коду.
        ЗАПРЕЩЕНО добавлять пункты, требующие:
        - Запуска полного UE Editor / UE build (в pipeline нет UE binary)
        - Post-pipeline шагов (перемещение task файла в done/ — делает блок commit)
        - Внешних GUI-инструментов, ручного тестирования gameplay, визуальной проверки
        - Бинарных assets (.uasset, .umap) — их нельзя проверить grep/read

        Фокус: корректность кода, API-контракты, изменения модели данных, покрытие тестами.
    approval: true
    depends_on: ["task_md"]
    config: {}

  - id: "clarification"
    block: "clarification"
    agent:
      tier: "smart"
    approval: false
    depends_on: ["analysis"]
    condition: "$.analysis.needs_clarification == true"
    config: {}

  # Merged branch_setup + create_branch — operator approves the shell script
  # once, then names and creates the branch atomically.
  - id: "create_branch"
    block: "shell_exec"
    approval: true
    depends_on: ["analysis"]
    config:
      working_dir: "/projects/<example>"   # TODO: project working dir
      command: |
        FEAT_ID='${task_md.feat_id}'
        TITLE='${task_md.title}'
        TITLE_SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//' | cut -c1-40)
        BRANCH="feat/$FEAT_ID-$TITLE_SLUG"
        if [ -z "$FEAT_ID" ] || [ "$FEAT_ID" = "null" ]; then BRANCH="$FEAT_ID"; fi
        echo "Создаю ветку: $BRANCH"
        git fetch --quiet origin main 2>/dev/null || true
        if git rev-parse --verify "$BRANCH" >/dev/null 2>&1; then
          echo "Ветка $BRANCH уже существует, переключаюсь"
          git checkout "$BRANCH"
        else
          git checkout -b "$BRANCH" main 2>/dev/null || git checkout -b "$BRANCH"
          echo "Создана ветка $BRANCH"
        fi
        printf '{"branch_name":"%s","base_branch":"main"}' "$BRANCH"
      allow_nonzero_exit: false
      timeout_sec: 60

  # ── Orchestrator: plan ────────────────────────────────────────────────────
  - id: "plan_impl"
    block: "orchestrator"
    agent:
      tier: "smart"
      temperature: 0.1
      maxTokens: 8192
    approval: false
    depends_on: ["create_branch"]
    config:
      mode: "plan"
      max_iterations: 22
      working_dir: "/projects/<example>"
      budget_usd_cap: 0.8
      context_blocks: ["task_md", "analysis"]
      # Accept Markdown if the model refuses JSON; parser extracts goal/approach/files.
      prose_fallback: true
      # Inject top-3 RAG chunks (semantic search on task.md.to_be) — drops package
      # path hallucination on first-pass plans.
      auto_inject_rag: true

  # ── Implementation ────────────────────────────────────────────────────────
  - id: "impl_server"
    block: "agent_with_tools"
    agent:
      tier: "smart"
      temperature: 0.2
      maxTokens: 32768
    approval: false
    depends_on: ["plan_impl"]
    config:
      max_iterations: 40
      preload_from: "plan_impl"
      user_message: |
        Feature: ${task_md.title}

        ## Plan
        Goal: ${plan_impl.goal}

        Approach:
        ${plan_impl.approach}

        Files to touch:
        ${plan_impl.files_to_touch}

        ## Definition of Done
        ${plan_impl.definition_of_done}

        ## Full spec
        ${task_md.to_be}

        ## Acceptance criteria (raw from task.md)
        ${task_md.acceptance}

        ## Acceptance checklist (smart-tier analysis — single source of truth)
        ${analysis.acceptance_checklist}

        Every CRITICAL and IMPORTANT item in the checklist must be done before you finish.
        Implement the change. Do NOT switch branches — pipeline already prepared one.
        After each edit run your build's compile check (gradle/mvn/npm/etc).
        Do NOT mark done until compilation succeeds.
        Do NOT move task files from tasks/active/ to tasks/done/ — the commit block does this.

        ## IF YOU ARE RUNNING ON A LOOPBACK ITERATION
        Check `_loopback` in your input map — if present, the previous review/verify
        flagged specific issues. Read EVERY entry in `_loopback.issues` (or
        `_loopback.failed_items` for verify_acceptance loopback) and address each one
        explicitly. Use Grep across the whole project to locate enums/strings/configs
        the issue refers to.
      working_dir: "/projects/<example>"
      budget_usd_cap: 5
      focus_on_failure: true        # narrow prompt on build/tests loopback
      auto_inject_rag: true         # top-3 RAG chunks in user_message
      allowed_tools: ["Read", "Write", "Edit", "Glob", "Grep", "Bash", "Search"]
      # TODO: adapt allowlist to your build tool. Examples for gradle Java:
      bash_allowlist:
        - "Bash(git status)"
        - "Bash(git diff*)"
        - "Bash(git add*)"
        - "Bash(git branch*)"
        - "Bash(git log*)"
        - "Bash(cat *)"
        - "Bash(ls*)"
        - "Bash(find*)"
        - "Bash(grep*)"
        - "Bash(./gradlew compileJava*)"
        - "Bash(./gradlew test*)"
        - "Bash(cd * && ./gradlew compileJava*)"
        - "Bash(cd * && ./gradlew test*)"
        # Maven:    - "Bash(mvn compile)" - "Bash(mvn test)"
        # npm:      - "Bash(npm run build)" - "Bash(npm test)"
        # cargo:    - "Bash(cargo check)" - "Bash(cargo test)"

  # ── Orchestrator: review ──────────────────────────────────────────────────
  - id: "review_impl"
    block: "orchestrator"
    agent:
      tier: "smart"
      temperature: 0.1
      maxTokens: 8192
    approval: false
    depends_on: ["impl_server"]
    config:
      mode: "review"
      max_iterations: 50
      plan_block: "plan_impl"
      working_dir: "/projects/<example>"
      budget_usd_cap: 1.5
      prose_fallback: true
    verify:
      checks: []
      on_fail:
        action: "loopback"
        target: "impl_server"
        max_iterations: 3
        inject_context:
          retry_instruction: "$.review_impl.retry_instruction"
          issues: "$.review_impl.issues"

  # ── Build & tests (merged shell+verify — self-loopback on success=false) ──
  # TODO: adapt build/tests to your stack (gradle/mvn/npm/cargo).
  - id: "build"
    block: "shell_exec"
    approval: false
    depends_on: ["review_impl"]
    config:
      working_dir: "/projects/<example>/server"   # TODO: source root
      command: |
        echo "=== Build auto-detect ==="
        BUILD_OK=0
        if [ -f "gradlew" ]; then
          ./gradlew compileJava --no-daemon -q 2>&1 && BUILD_OK=1
        elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
          gradle compileJava --no-daemon -q 2>&1 && BUILD_OK=1
        elif [ -f "pom.xml" ]; then
          mvn compile -q 2>&1 && BUILD_OK=1
        fi
        if [ -f "../client/package.json" ] || [ -f "package.json" ]; then
          PKG=$([ -f "package.json" ] && echo "." || echo "../client")
          (cd "$PKG" && npm run build 2>&1) && BUILD_OK=1
        fi
        if [ "$BUILD_OK" -eq 0 ]; then
          echo "No build system detected or build failed"
          exit 1
        fi
      allow_nonzero_exit: true
      timeout_sec: 600
    on_failure:
      action: "loopback"
      target: "impl_server"
      max_iterations: 2
      inject_context:
        build_stderr: "$.build.stderr"
        build_stdout: "$.build.stdout"
        build_exit: "$.build.exit_code"

  - id: "tests"
    block: "shell_exec"
    approval: false
    depends_on: ["build"]
    config:
      working_dir: "/projects/<example>/server"   # TODO: test root
      command: |
        set -o pipefail
        if [ -f "gradlew" ]; then
          ./gradlew test --no-daemon -q 2>&1 | tail -40
        elif [ -f "pom.xml" ]; then
          mvn test -q 2>&1 | tail -40
        elif [ -f "package.json" ]; then
          npm test -- --watchAll=false 2>&1 | tail -40
        else
          echo "No tests detected — skipped"
        fi
      allow_nonzero_exit: true
      timeout_sec: 600
    on_failure:
      action: "loopback"
      target: "impl_server"
      max_iterations: 2
      inject_context:
        test_failures: "$.tests.stdout"

  # ── PROJECT-SPECIFIC: contract validator (merged with verify) ────────────
  # Remove if your project has no external contract validator. Self-skips when
  # contracts/ has no diff or contracts/validator/ is missing.
  - id: "validate_contracts"
    block: "shell_exec"
    approval: false
    depends_on: ["tests"]
    config:
      working_dir: "/projects/<example>"
      command: |
        set -o pipefail
        if git diff --quiet main..HEAD -- contracts/ 2>/dev/null; then
          echo "No contracts/ changes vs main — skipping"
          exit 0
        fi
        if [ ! -d "contracts/validator" ]; then
          echo "contracts/validator not found — skipping"
          exit 0
        fi
        cd contracts/validator
        if command -v uv >/dev/null 2>&1; then uv run python validator.py
        elif command -v python3 >/dev/null 2>&1; then python3 validator.py
        else echo "Neither uv nor python3 available — skipping"; exit 0
        fi
      allow_nonzero_exit: true
      timeout_sec: 120
    on_failure:
      action: "loopback"
      target: "impl_server"
      max_iterations: 2
      inject_context:
        contract_errors: "$.validate_contracts.stdout"

  # ── PROJECT-SPECIFIC: end-to-end smoke (merged with verify) ──────────────
  # Replace with your project's E2E runner. Self-skips if `runAISimulator` task
  # isn't registered.
  - id: "ai_simulator"
    block: "shell_exec"
    approval: false
    depends_on: ["validate_contracts"]
    config:
      working_dir: "/projects/<example>/server"
      command: |
        set -o pipefail
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found — skipping smoke"
          exit 0
        fi
        if ! ./gradlew tasks --no-daemon -q 2>&1 | grep -qi "runAISimulator"; then
          echo "runAISimulator task not registered — skipping"
          exit 0
        fi
        ./gradlew runAISimulator --no-daemon -q 2>&1 | tail -60
      allow_nonzero_exit: true
      timeout_sec: 600
    on_failure:
      action: "loopback"
      target: "impl_server"
      max_iterations: 1
      inject_context:
        ai_sim_output: "$.ai_simulator.stdout"

  # ── Acceptance gate ──────────────────────────────────────────────────────
  - id: "verify_acceptance"
    block: "agent_verify"
    agent:
      tier: "smart"
      maxTokens: 8192
    approval: false
    depends_on: ["analysis", "ai_simulator"]
    config:
      subject: "analysis"
      working_dir: "/projects/<example>"
      pass_threshold: "critical_and_important"
      max_iterations: 12
      budget_usd_cap: 1.5
      allowed_tools: ["Read", "Grep", "Glob", "Bash", "Search"]
      # TODO: adapt allowlist to your test/build tool
      bash_allowlist:
        - "Bash(./gradlew test*)"
        - "Bash(./gradlew compileJava*)"
        - "Bash(cd * && ./gradlew test*)"
        - "Bash(cd * && ./gradlew compileJava*)"
        - "Bash(cat *)"
        - "Bash(ls*)"
        - "Bash(find*)"
        - "Bash(git diff*)"
        - "Bash(git log*)"
    on_failure:
      action: "loopback"
      target: "impl_server"
      max_iterations: 2
      failed_statuses: []
      inject_context:
        failed_items: "$.verify_acceptance.failed_items"
        passed_items: "$.verify_acceptance.passed_items"
        _previous_verification_results: "$.verify_acceptance.verification_results"

  # ── PROJECT-SPECIFIC: Unreal Engine Blueprint sub-flow ───────────────────
  # Gated on `task_md.needs_bp == true` via keyword heuristics (configurable in
  # Settings → Integrations → UNREAL → heuristicKeywords, or built-in defaults).
  # REMOVE this entire section if your project has no Unreal/Blueprint side.
  - id: "check_unreal"
    block: "shell_exec"
    approval: true
    condition: "$.task_md.needs_bp == true"
    depends_on: ["verify_acceptance"]
    config:
      working_dir: "/projects/<example>"
      command: |
        if command -v nc >/dev/null 2>&1 && nc -z -w2 host.docker.internal 55557 2>/dev/null; then
          echo "Unreal MCP available on host.docker.internal:55557"
          exit 0
        fi
        echo "ВНИМАНИЕ: Unreal Editor недоступен (порт 55557 не отвечает)."
        echo "Запустите Unreal Editor с MCP плагином и нажмите Approve."
      allow_nonzero_exit: true
      timeout_sec: 15

  - id: "plan_bp"
    block: "orchestrator"
    agent:
      tier: "smart"
      temperature: 0.1
      maxTokens: 8192
    approval: false
    condition: "$.task_md.needs_bp == true"
    depends_on: ["check_unreal"]
    config:
      mode: "plan"
      max_iterations: 15
      working_dir: "/projects/<example>"
      budget_usd_cap: 1
      context_blocks: ["task_md", "review_impl"]
      prose_fallback: true
      auto_inject_rag: true

  - id: "impl_bp"
    block: "agent_with_tools"
    agent:
      tier: "flash"
      temperature: 0.2
      maxTokens: 32768
    approval: false
    condition: "$.task_md.needs_bp == true"
    depends_on: ["plan_bp"]
    config:
      max_iterations: 20
      preload_from: "plan_bp"
      user_message: |
        Feature: ${task_md.title}

        ## Blueprint Plan
        Goal: ${plan_bp.goal}
        Approach: ${plan_bp.approach}
        Files to touch: ${plan_bp.files_to_touch}
        Definition of Done: ${plan_bp.definition_of_done}

        Server side already done. Now implement the BP/UMG side via MCP.
        Native tools cannot edit .uasset / .umap files — use mcp_unreal-mcp__*
        tools for all Blueprint operations. Do NOT modify server/ files.
      working_dir: "/projects/<example>"
      budget_usd_cap: 3
      auto_inject_rag: true
      allowed_tools: ["Read", "Glob", "Grep", "Bash", "Search"]
      mcp_servers: ["unreal-mcp"]    # configured under Settings → MCP servers
      bash_allowlist:
        - "Bash(git status)"
        - "Bash(git diff*)"
        - "Bash(git add*)"
        - "Bash(ls*)"

  - id: "review_bp"
    block: "orchestrator"
    agent:
      tier: "smart"
      temperature: 0.1
      maxTokens: 8192
    approval: false
    condition: "$.task_md.needs_bp == true"
    depends_on: ["impl_bp"]
    config:
      mode: "review"
      max_iterations: 15
      plan_block: "plan_bp"
      working_dir: "/projects/<example>"
      budget_usd_cap: 1
      prose_fallback: true
    verify:
      checks: []
      on_fail:
        action: "loopback"
        target: "impl_bp"
        max_iterations: 2
        inject_context:
          retry_instruction: "$.review_bp.retry_instruction"
          issues: "$.review_bp.issues"

  # ── Final review, commit, push, PR ────────────────────────────────────────
  - id: "diff_review"
    block: "shell_exec"
    approval: true
    # When the BP sub-flow is removed, change depends_on to ["verify_acceptance"]
    depends_on: ["review_bp"]
    config:
      working_dir: "/projects/<example>"
      command: |
        echo "=== Изменённые файлы ==="
        git status --short
        echo ""
        echo "=== Статистика ==="
        git diff --stat
        echo ""
        echo "=== Diff (первые 300 строк) ==="
        git diff | head -300
      allow_nonzero_exit: true
      timeout_sec: 30

  - id: "commit"
    block: "shell_exec"
    approval: false
    depends_on: ["diff_review"]
    config:
      working_dir: "/projects/<example>"
      command: |
        cd /projects/<example>
        git config core.autocrlf false

        # TODO: adapt scope. server/ + contracts/ + tasks/ covers a typical layout.
        git add -u -- server/ contracts/ tasks/

        # Auto-move task.md from active/ to done/ in same commit.
        FEAT_ID='${task_md.feat_id}'
        SLUG='${task_md.slug}'
        ACTIVE="tasks/active/$FEAT_ID-$SLUG.md"
        DONE="tasks/done/$FEAT_ID-$SLUG.md"
        if [ -f "$ACTIVE" ]; then
          mkdir -p tasks/done
          git mv "$ACTIVE" "$DONE" 2>/dev/null || mv "$ACTIVE" "$DONE"
          git add "$DONE"
        fi

        if git diff --cached --quiet; then
          echo "ERROR: nothing staged — pipeline produced no committable changes"
          exit 1
        fi

        TITLE='${task_md.feat_id}: ${task_md.title}'
        BODY='Implements acceptance criteria from ${task_md.slug}.md'
        if git commit -m "$TITLE" -m "$BODY"; then
          echo "Committed."
        else
          echo "ERROR: git commit failed"
          exit 1
        fi
      allow_nonzero_exit: false
      timeout_sec: 60

  - id: "git_push"
    block: "shell_exec"
    approval: false
    depends_on: ["commit"]
    config:
      working_dir: "/projects/<example>"
      command: |
        BRANCH=$(git branch --show-current)
        if [ -z "$BRANCH" ] || [ "$BRANCH" = "main" ]; then
          echo "Refusing to push from '$BRANCH' — pipeline expected a feature branch"
          exit 1
        fi
        if ! git remote get-url origin >/dev/null 2>&1; then
          echo "No 'origin' remote — skipping push"
          exit 0
        fi
        git push -u origin "$BRANCH" 2>&1
      allow_nonzero_exit: true
      timeout_sec: 60

  - id: "pr_link"
    block: "shell_exec"
    approval: false
    depends_on: ["git_push"]
    config:
      working_dir: "/projects/<example>"
      command: |
        BRANCH=$(git branch --show-current)
        REMOTE=$(git remote get-url origin 2>/dev/null || echo "")
        if [ -z "$REMOTE" ]; then
          echo "No origin remote — skipping PR URL"
          exit 0
        fi
        # owner/repo from git@github.com:owner/repo.git or https://github.com/owner/repo.git
        SLUG=$(echo "$REMOTE" | sed -E 's#(git@github\.com:|https?://github\.com/)([^/]+/[^/.]+)(\.git)?#\2#' | sed 's#\.git$##')
        if echo "$SLUG" | grep -q '^[^/]\+/[^/]\+$'; then
          URL="https://github.com/$SLUG/compare/main...$BRANCH?expand=1"
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "  Создать PR одним кликом:"
          echo "  $URL"
          echo "════════════════════════════════════════════════════════════"
        else
          echo "origin remote is not a GitHub URL — manual PR required"
          echo "Branch pushed: $BRANCH"
        fi
      allow_nonzero_exit: false
      timeout_sec: 15

triggers: []

entry_points:
  - id: "implement"
    name: "Implement a task.md ticket"
    description: ""
    inject: []
    from_block: "task_md"
    requires_input: "task_file"
